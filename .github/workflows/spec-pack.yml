name: Spec pack

# Build the completion spec pack and publish it as a rolling release asset
# (fixed tag: `specs`) that the app downloads at runtime — so specs update
# without an app release. Run manually from the Actions tab (workflow_dispatch).
#
# The app downloads:
#   https://github.com/tinecli/tine/releases/download/specs/specs.tar.gz
on:
  workflow_dispatch:

permissions:
  contents: write   # publish the rolling release

jobs:
  pack:
    name: Build & publish spec pack
    runs-on: macos-26   # build-specs.sh uses the darwin-arm64 esbuild binary
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install tools
        run: corepack enable

      - name: Install JS deps
        run: corepack pnpm install

      - name: Fetch Fig specs
        run: corepack pnpm add -w -D @withfig/autocomplete

      - name: Build spec pack
        run: bash scripts/build-specs.sh

      - name: Tarball
        run: tar -czf specs.tar.gz -C specs-pack .

      - name: Publish rolling 'specs' release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Replace the rolling release so the fixed download URL always serves latest.
          gh release delete specs --yes --cleanup-tag 2>/dev/null || true
          gh release create specs specs.tar.gz \
            --title "Completion spec pack" \
            --notes "Rolling spec pack the app downloads at runtime. $(du -h specs.tar.gz | cut -f1) · updated $(date -u +%Y-%m-%dT%H:%MZ)."
