name: Release

# On a version tag (v1.2.3): build the spec pack + app, package a Developer ID
# signed + notarized dmg, attach it to a GitHub Release, and bump the Homebrew
# cask in gustaferiksson/homebrew-tap.
#
# Secrets:
#   APPLE_CERT_P12        base64 of the exported "Developer ID Application" cert (.p12)
#   APPLE_CERT_PASSWORD   password used when exporting that .p12
#   NOTARY_APPLE_ID       Apple ID email for notarytool
#   NOTARY_PASSWORD       app-specific password for that Apple ID
#   TAP_GITHUB_TOKEN      PAT with write access to gustaferiksson/homebrew-tap
# If the Apple secrets are unset the build falls back to ad-hoc signing (no
# notarization); if TAP_GITHUB_TOKEN is unset the cask bump is skipped.
on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write   # create the GitHub Release

jobs:
  release:
    name: Build & release
    runs-on: macos-26   # preview image: builds on the macOS 26 SDK so releases ship Liquid Glass
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install tools
        run: |
          corepack enable
          brew install librsvg

      - name: Install JS deps
        run: corepack pnpm install

      - name: Fetch upstream Fig specs
        run: corepack pnpm add -w -D @withfig/autocomplete

      - name: Build + install spec pack
        run: bash scripts/install-specs.sh

      - name: Import signing certificate
        env:
          APPLE_CERT_P12: ${{ secrets.APPLE_CERT_P12 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${APPLE_CERT_P12:-}" ]; then
            echo "APPLE_CERT_P12 unset — falling back to ad-hoc signing."
            echo "TINE_SIGN_ID=-" >> "$GITHUB_ENV"
            exit 0
          fi
          KEYCHAIN="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PW="$(openssl rand -base64 24)"
          echo "$APPLE_CERT_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security import "$RUNNER_TEMP/cert.p12" -P "$APPLE_CERT_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PW" "$KEYCHAIN" >/dev/null
          security list-keychains -d user -s "$KEYCHAIN" login.keychain-db
          rm -f "$RUNNER_TEMP/cert.p12"
          ID="$(security find-identity -v -p codesigning "$KEYCHAIN" \
            | awk -F '"' '/Developer ID Application/{print $2; exit}')"
          echo "Imported: $ID"
          echo "TINE_SIGN_ID=$ID" >> "$GITHUB_ENV"

      - name: Package (Developer ID signed + notarized)
        env:
          TINE_VERSION: ${{ steps.ver.outputs.version }}
          TINE_BUILD: ${{ github.run_number }}
          NOTARY_APPLE_ID: ${{ secrets.NOTARY_APPLE_ID }}
          NOTARY_TEAM_ID: "82K3YC8HVF"
          NOTARY_PASSWORD: ${{ secrets.NOTARY_PASSWORD }}
        run: bash scripts/package.sh

      - name: Compute sha256
        id: sha
        run: |
          echo "sha256=$(shasum -a 256 "dist/Tine-${{ steps.ver.outputs.version }}.dmg" | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "dist/Tine-${{ steps.ver.outputs.version }}.dmg" \
            --title "Tine ${{ steps.ver.outputs.version }}" \
            --notes "Install: \`brew install --cask gustaferiksson/tap/tine\`. Developer ID signed & notarized."

      - name: Bump Homebrew cask
        env:
          TAP_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
          VERSION: ${{ steps.ver.outputs.version }}
          SHA256: ${{ steps.sha.outputs.sha256 }}
        run: |
          set -euo pipefail
          if [ -z "${TAP_TOKEN:-}" ]; then
            echo "TAP_GITHUB_TOKEN not set — skipping cask bump."; exit 0
          fi
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/gustaferiksson/homebrew-tap.git" tap
          cd tap
          sed -i '' -E "s/^  version \".*\"/  version \"$VERSION\"/" Casks/tine.rb
          sed -i '' -E "s/^  sha256 \".*\"/  sha256 \"$SHA256\"/" Casks/tine.rb
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "tine $VERSION"
          git push
